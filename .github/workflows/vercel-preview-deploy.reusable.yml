# Invoked by preview.yml via workflow_call + secrets: inherit so the entry workflow stays free of secrets.* references.
on:
  workflow_call:
    secrets:
      VERCEL_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Export variables for build and deploy
        id: repo
        env:
          REPO_VARS_JSON: ${{ toJSON(vars) }}
        run: |
          URL=$(echo "$REPO_VARS_JSON" | jq -r '.["VITE_SUPABASE_URL"] // empty')
          KEY=$(echo "$REPO_VARS_JSON" | jq -r '.["VITE_SUPABASE_ANON_KEY"] // empty')
          ORG=$(echo "$REPO_VARS_JSON" | jq -r '.["VERCEL_ORG_ID"] // empty')
          PROJ=$(echo "$REPO_VARS_JSON" | jq -r '.["VERCEL_PROJECT_ID"] // empty')
          echo "VITE_SUPABASE_URL=$URL" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=$KEY" >> "$GITHUB_ENV"
          echo "org_id=$ORG" >> "$GITHUB_OUTPUT"
          echo "project_id=$PROJ" >> "$GITHUB_OUTPUT"

      - name: Build
        run: npm run build

      - name: Deploy to Vercel Preview
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ steps.repo.outputs.org_id }}
          vercel-project-id: ${{ steps.repo.outputs.project_id }}
          scope: ${{ steps.repo.outputs.org_id }}
