apply plugin: 'com.android.application'

// Release signing: android/keystore.properties (gitignored). Falls back to -PKEYSTORE_* Gradle props.
def keystorePropertiesFile = rootProject.file('keystore.properties')
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withInputStream { stream ->
        keystoreProperties.load(new InputStreamReader(stream, 'UTF-8'))
    }
}

def trimSigningProp = { Properties props, String key ->
    def value = props.getProperty(key)
    return value != null ? value.trim() : null
}

def gradleSigningProp = { String key ->
    def value = project.findProperty(key)
    return value != null ? value.toString().trim() : null
}

def resolveSigningValue = { String propertiesKey, String gradleKey ->
    if (keystorePropertiesFile.exists()) {
        return trimSigningProp(keystoreProperties, propertiesKey)
    }
    return gradleSigningProp(gradleKey)
}

def inferKeystoreType = { File storeFile, String explicitType ->
    if (explicitType) {
        return explicitType
    }
    def name = storeFile.name.toLowerCase(Locale.US)
    if (name.endsWith('.p12') || name.endsWith('.pfx')) {
        return 'PKCS12'
    }
    if (name.endsWith('.jks')) {
        return 'JKS'
    }
    // Extensionless keys from `keytool -genkeypair` on Java 9+ are PKCS12, not JKS.
    // Wrong storeType → javax.crypto.BadPaddingException during signing.
    return 'PKCS12'
}

android {
    namespace = "com.reride.app"
    compileSdk = rootProject.ext.compileSdkVersion
    lint {
        abortOnError false
        disable 'Instantiatable'
    }
    defaultConfig {
        applicationId "com.reride.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 27
        versionName "1.0.21"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            def storeFilePath = resolveSigningValue('storeFile', 'KEYSTORE_FILE')
            def storePasswordValue = resolveSigningValue('storePassword', 'KEYSTORE_PASSWORD')
            def keyAliasValue = resolveSigningValue('keyAlias', 'KEY_ALIAS')
            def keyPasswordValue = resolveSigningValue('keyPassword', 'KEY_PASSWORD')
            def storeTypeValue = resolveSigningValue('storeType', 'KEYSTORE_TYPE')

            if (storeFilePath) {
                def store = keystorePropertiesFile.exists()
                    ? rootProject.file(storeFilePath)
                    : file(storeFilePath)
                if (!store.exists()) {
                    throw new GradleException(
                        "Release keystore not found at ${store.absolutePath}. " +
                        "Update android/keystore.properties storeFile (see keystore.properties.example)."
                    )
                }
                storeFile store
                storePassword storePasswordValue
                keyAlias keyAliasValue
                keyPassword keyPasswordValue ?: storePasswordValue
                storeType inferKeystoreType(store, storeTypeValue)
            }
        }
    }
    
    buildTypes {
        release {
            // R8 shrinks and obfuscates Java/Kotlin; Play Console needs mapping.txt for readable crash/ANR stacks.
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (keystorePropertiesFile.exists() || project.hasProperty('KEYSTORE_FILE')) {
                signingConfig signingConfigs.release
            }
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar', '*.aar'], dir: 'libs')
    implementation fileTree(include: ['*.jar', '*.aar'], dir: '../capacitor-cordova-android-plugins/src/main/libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
