    <!-- OAuth PKCE verifier is stored per-origin. Never redirect apex→www on ?code= or ?error= (would break Google sign-in). -->
    <script>
      (function () {
        try {
          var h = (location.hostname || '').toLowerCase();
          if (h !== 'reride.co.in') return;
          var sp = new URLSearchParams(location.search || '');
          if (sp.has('code') || sp.has('error')) return;
          location.replace(
            'https://www.reride.co.in' + location.pathname + (location.search || '') + (location.hash || ''),
          );
        } catch (e) {}
      })();
    </script>
    <!-- MUST run before reride-api-fetch-boot.js: apex https://reride.co.in returns 307; CORS preflight cannot follow redirects. -->
    <script>
      (function () {
        if (typeof window === 'undefined' || typeof window.fetch !== 'function') return;
        var downstream = window.fetch.bind(window);
        function apexToWww(str) {
          return str.replace(/(https?:\/\/)reride\.co\.in(?=[:/?#]|$)/gi, '$1www.reride.co.in');
        }
        window.fetch = function (input, init) {
          try {
            if (typeof input === 'string') return downstream(apexToWww(input), init);
            if (typeof URL !== 'undefined' && input instanceof URL) {
              var href = apexToWww(input.href);
              return downstream(href !== input.href ? href : input, init);
            }
            if (typeof Request !== 'undefined' && input instanceof Request) {
              var u = input.url;
              var parsed = new URL(u);
              if (parsed.hostname === 'reride.co.in') {
                parsed.hostname = 'www.reride.co.in';
                return downstream(new Request(parsed.toString(), input), init);
              }
            }
          } catch (e) {}
          return downstream(input, init);
        };
      })();
    </script>

    <script>
      (function () {
        var h = location.hostname;
        var p = location.protocol;
        var port = location.port || '';
        var devPorts = ['5173', '4173', '3000', '8080'];
        window.__RERIDE_SKIP_REMOTE_FONTS__ =
          h === 'appassets.androidplatform.net' ||
          h.indexOf('appassets.androidplatform.net') !== -1 ||
          (h === 'localhost' && (p === 'capacitor:' || p === 'ionic:')) ||
          (h === 'localhost' && p === 'https:' && devPorts.indexOf(port) === -1);
      })();
    </script>
    <!-- Packaged WebView: force API + apex → www before bundle loads (avoids 307 on CORS preflight). -->
    <script>
      (function () {
        try {
          var h = (location.hostname || '').toLowerCase();
          if (h !== 'appassets.androidplatform.net' && h.indexOf('appassets.androidplatform.net') === -1) {
            return;
          }
          var base = 'https://www.reride.co.in';
          function normalizeApexStr(u) {
            if (typeof u !== 'string') return u;
            return u.replace(/(https?:\/\/)reride\.co\.in(?=[:/?#]|$)/gi, '$1www.reride.co.in');
          }
          var orig = window.fetch.bind(window);
          window.fetch = function (input, init) {
            try {
              if (typeof input === 'string') {
                var s = normalizeApexStr(input);
                if (s.indexOf('/api/') === 0) s = base + s;
                return orig(s, init);
              }
              if (typeof URL !== 'undefined' && input instanceof URL) {
                var uh = normalizeApexStr(input.href);
                return orig(uh !== input.href ? uh : input, init);
              }
              if (typeof Request !== 'undefined' && input instanceof Request) {
                var ru = input.url;
                var parsed;
                try {
                  parsed = new URL(ru);
                } catch (e0) {
                  return orig(input, init);
                }
                if (parsed.hostname === 'reride.co.in') {
                  parsed.hostname = 'www.reride.co.in';
                  return orig(new Request(parsed.toString(), input), init);
                }
                if (parsed.pathname.indexOf('/api/') === 0) {
                  var full = base + parsed.pathname + parsed.search + parsed.hash;
                  return orig(new Request(full, input), init);
                }
                var n = normalizeApexStr(ru);
                if (n !== ru) return orig(new Request(n, input), init);
              }
            } catch (e1) {}
            return orig(input, init);
          };
        } catch (e) {}
      })();
    </script>
    <script>

        if (window.__RERIDE_SKIP_REMOTE_FONTS__) {

            'html,body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}';

    <!-- CRITICAL: Polyfill process.emitWarning BEFORE any modules load -->
    <script>
      // Polyfill process.emitWarning for browser compatibility - must run FIRST
      (function() {
        if (typeof window !== 'undefined') {
          if (typeof process === 'undefined') {
            window.process = { env: {} };
          }
          if (!window.process.emitWarning) {
            window.process.emitWarning = function(msg, type, code, ctor) {
              // Silently handle warnings to prevent errors
              if (typeof console !== 'undefined' && console.warn) {
                console.warn('[process.emitWarning]', msg);
              }
            };
          }
          // Ensure process is available globally
          if (typeof globalThis !== 'undefined') {
            globalThis.process = window.process;
          }
        }
      })();
    </script>
    
    <!-- Prefetch API endpoints only in production or when API server is confirmed available -->
    <script>
      
      // Only prefetch if we're in production mode (not localhost)
      (function() {
        const h = window.location.hostname || '';
        const hl = h.toLowerCase();
        const isLocalhost = h === 'localhost' || 
                           h === '127.0.0.1' ||
                           h.includes('localhost');
        const isPackagedWebView =
          hl === 'appassets.androidplatform.net' ||
          hl.indexOf('appassets.androidplatform.net') !== -1 ||
          (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
        
        // Skip prefetch in development to avoid 404 errors when API server isn't running
        if (isLocalhost) {
          return;
        }
        // Capacitor / WebViewAssetLoader: relative /api/* has no same-origin server; avoid noise and wrong-host requests
        if (isPackagedWebView) {
          return;
        }
        
        // In production, prefetch after page load
        window.addEventListener('load', () => {
          setTimeout(() => {
            // Check if API server is available before prefetching
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2000);
            
            fetch('/api/vehicles?limit=30&skipExpiryCheck=true', { 
              method: 'HEAD', 
              cache: 'default',
              signal: controller.signal
            })
              .then(response => {
                clearTimeout(timeoutId);
                if (response.ok) {
                  // Prefetch first page for instant display
                  const link1 = document.createElement('link');
                  link1.rel = 'prefetch';
                  link1.href = '/api/vehicles?limit=30&skipExpiryCheck=true';
                  document.head.appendChild(link1);
                  
                  // Prefetch next page (loads next page in background)
                  const link2 = document.createElement('link');
                  link2.rel = 'prefetch';
                  link2.href = '/api/vehicles?limit=30&page=2&skipExpiryCheck=true';
                  document.head.appendChild(link2);
                  
                  // Prefetch users data
                  const link3 = document.createElement('link');
                  link3.rel = 'prefetch';
                  link3.href = '/api/users';
                  document.head.appendChild(link3);
                }
              })
              .catch(() => {
                clearTimeout(timeoutId);
                // Silently fail if API server is not available
              });
          }, 2000);
        });
      })();
    </script>

    <!-- Fix for zoom issues - ensure proper viewport scaling -->
    <script>
      // Ensure viewport is set correctly and reset any zoom
      (function() {
        // Force viewport meta tag
        let viewport = document.querySelector('meta[name="viewport"]');
        if (!viewport) {
          viewport = document.createElement('meta');
          viewport.name = 'viewport';
          document.getElementsByTagName('head')[0].appendChild(viewport);
        }
        viewport.content = 'width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, shrink-to-fit=no';
        
        // ✅ FIX: Reset any CSS zoom - check if elements exist first
        if (document.documentElement) {
          document.documentElement.style.zoom = '1';
        }
        // ✅ FIX: Check if body exists before accessing its style
        if (document.body) {
          document.body.style.zoom = '1';
        } else {
          // If body doesn't exist yet, wait for DOMContentLoaded
          document.addEventListener('DOMContentLoaded', function() {
            if (document.body) {
              document.body.style.zoom = '1';
            }
          });
        }
        
        // Prevent text size adjustment that causes zooming
        if (document.documentElement && 'textSizeAdjust' in document.documentElement.style) {
          document.documentElement.style.textSizeAdjust = '100%';
        }
      })();
    </script>

    <script type="module" src="/index.tsx"></script>
    <script>
      // Collect all JS errors so we can display them if React never mounts
      window.__RERIDE_ERRORS__ = [];

      window.addEventListener('error', function(e) {
        var msg = (e.message || '') + ' at ' + (e.filename || '?') + ':' + (e.lineno || '?');
        window.__RERIDE_ERRORS__.push(msg);

        // Script load failure
        if (e.target && e.target.tagName === 'SCRIPT' && (e.target.src || '').indexOf('assets/') !== -1) {
          showLoadError('Script failed to load: ' + (e.target.src || 'unknown'));
        }
      }, true);

      window.addEventListener('unhandledrejection', function(e) {
        var reason = e.reason;
        var msg = (reason instanceof Error) ? reason.message + '\n' + (reason.stack || '') : String(reason);
        window.__RERIDE_ERRORS__.push('Promise: ' + msg);
      });

      function showLoadError(detail) {
        if (window.__APP_SCRIPT_LOAD_FAILED__) return;
        window.__APP_SCRIPT_LOAD_FAILED__ = true;
        var root = document.getElementById('root');
        if (!root) return;
        var errors = (window.__RERIDE_ERRORS__ || []).join('<br><br>');
        var extra = detail ? '<p style="color:#c00;font-size:12px;margin-top:16px;text-align:left;word-break:break-all;">' + detail + '</p>' : '';
        var errBlock = errors ? '<details style="margin-top:16px;text-align:left;"><summary style="cursor:pointer;color:#666;font-size:13px;">Error details</summary><pre style="background:#f5f5f5;padding:12px;border-radius:8px;font-size:11px;overflow-x:auto;margin-top:8px;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;">' + errors + '</pre></details>' : '';
        root.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#FFFFFF;padding:20px;"><div style="text-align:center;max-width:600px;"><h1 style="color:#2C2C2C;font-size:24px;font-weight:700;margin-bottom:16px;">Unable to Load ReRide</h1><p style="color:#666;font-size:16px;margin-bottom:24px;line-height:1.6;">The app could not start.</p><button onclick="window.location.reload()" style="background:#FF6B35;color:white;border:none;padding:12px 24px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">Refresh Page</button>' + extra + errBlock + '</div></div>';
      }

      // Detect if the app script failed to load (e.g. 404 in production)
      (function() {
        var scriptEl = document.querySelector('script[src="/index.tsx"], script[src^="/assets/index"], script[src^="./assets/index"]');
        if (scriptEl) {
          scriptEl.addEventListener('error', function() { showLoadError('Entry script load failed'); });
        }
      })();
    </script>
    <!-- Safety timeout: If React doesn't mount within 15 seconds, show error with diagnostics -->
    <script>
      (function() {
        var timeoutId;
        var checkInterval;
        var reactMounted = false;
        var h = location.hostname;
        var p = location.protocol;
        var port = location.port || '';
        var devPorts = ['5173', '4173', '3000', '8080'];
        var isCapacitorLike =
          (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()) ||
          h === 'appassets.androidplatform.net' ||
          h.indexOf('appassets.androidplatform.net') !== -1 ||
          (h === 'localhost' && (p === 'capacitor:' || p === 'ionic:' || (p === 'https:' && devPorts.indexOf(port) === -1)));
        // Allow slower devices to finish JS hydration before showing a fatal error.
        var TIMEOUT_MS = isCapacitorLike ? 60000 : 30000;
        
        var checkReactMounted = function() {
          if (window.__RERIDE_MOUNTED__) return true;
          var root = document.getElementById('root');
          if (!root) return false;
          if (!root.innerHTML.includes('Loading ReRide')) return true;
          return false;
        };
        
        var clearMountTimeout = function() {
          reactMounted = true;
          if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
          if (checkInterval) { clearInterval(checkInterval); checkInterval = null; }
        };
        
        timeoutId = setTimeout(function() {
          if (!reactMounted) {
            var root = document.getElementById('root');
            if (root && !checkReactMounted()) {
              showLoadError('React did not mount within ' + (TIMEOUT_MS/1000) + 's');
            }
          }
        }, TIMEOUT_MS);
        
        var startChecking = function() {
          checkInterval = setInterval(function() {
            if (checkReactMounted()) {
              clearMountTimeout();
            }
          }, 500);
          
          setTimeout(function() {
            if (checkInterval) {
              clearInterval(checkInterval);
              checkInterval = null;
            }
          }, TIMEOUT_MS + 5000);
        };
        
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', startChecking);
        } else {
          startChecking();
        }
      })();
    </script>
